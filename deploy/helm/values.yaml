# Values watched by Argo CD.
#
# THE TAG BUMP HAPPENS HERE.
#
# .github/workflows/release.yml rewrites `image.tag` and `appVersion` on every
# git tag push. Argo CD detects the change, re-renders the chart, and Argo
# Rollouts picks up the new image — kicking off the canary.
#
# Don't edit `image.tag` by hand on main; let CI do it so the value matches
# what was pushed to ghcr.io.

image:
  repository: ghcr.io/observe-resolve/checkout
  tag: 1.1.3
  pullPolicy: Always

# Mirrored into pod env as APP_VERSION + into resource attributes via the
# OTel Operator's Instrumentation CR. Keep in sync with image.tag.
appVersion: 1.1.3

# Replica count for the Rollout's stable pool.
# Canary scales proportionally to setWeight (see templates/rollout.yaml).
replicas: 3

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { cpu: 500m, memory: 256Mi }

# SRG AnalysisTemplate — these are the names the Rollout's analysis steps
# reference. Don't rename without updating templates/rollout.yaml.
#
# As of the direct-invocation refactor, the AnalysisRun pod calls
# `validate-guardian-action` synchronously and exits on the verdict.
# No SDLC bizevent, no workflow polling — so pollIntervalSec, pollCount,
# and workflowId are gone. The pod's activeDeadlineSeconds is hardcoded
# to 120s in the template since the call typically returns in seconds.
analysis:
  templateName: srg-verdict
  dtctlImage: hrexed/dtctl:latest  # Container image for running dtctl guardian checks
  # Site Reliability Guardian objectId for the checkout-release-guardian.
  # Apply guardian definition first: dtctl apply -f dtctl/guardians/checkout-release-guardian.yaml
  # then copy the resulting objectId from `dtctl get settings --schema app:dynatrace.site.reliability.guardian:guardians`.
  guardianObjectId: "vu9U3hXa3q0AAAABADFhcHA6ZHluYXRyYWNlLnNpdGUucmVsaWFiaWxpdHkuZ3VhcmRpYW46Z3VhcmRpYW5zAAZ0ZW5hbnQABnRlbmFudAAkNzY0YmU4YTEtNWFmMy0zZTJiLTlkODYtZjM1OGI3ODIwNjNkvu9U3hXa3q0"

# Canary strategy. Edit cautiously — the on-camera scenarios assume two
# analysis gates (10 % then 50 %) before full cutover.
canary:
  steps:
    - setWeight: 10
    - pauseSec: 120
    - analysisAt: 10
    - setWeight: 50
    - pauseSec: 120
    - analysisAt: 50
    - setWeight: 100