# AnalysisTemplate — "Is the Site Reliability Guardian happy with this canary?"
#
# Single Job that calls validate-guardian-action directly via dtctl. The guardian
# runs synchronously and returns its verdict in one round trip — no SDLC event,
# no workflow polling, no wfe-task-result lookup. This replaces the earlier
# event-driven pattern that depended on a workflow listening for SDLC events.
#
# Why direct invocation:
#   - validate-guardian-action returns the complete verdict inline (stateful but
#     synchronous), so we don't need a workflow as a permission bridge once we
#     authenticate with a platform token that has the right scopes.
#   - Drops the activeDeadlineSeconds budget from minutes to seconds, since
#     there's no polling involved.
#   - Removes the bizevent ingest dependency and the Api-Token secret it required.
#
# Canary stage and version are forwarded as guardian variables. Reference them
# inside guardian DQL with $app_version and $canary_stage. They're also tagged
# onto a small "validation summary" bizevent at the end so dashboards and Grail
# queries can correlate verdicts to canary steps after the fact.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ .Values.analysis.templateName }}
  namespace: otel-demo
  labels:
    {{- include "checkout.labels" . | nindent 4 }}
spec:
  args:
    - name: app-version
    - name: canary-weight

  metrics:
    - name: srg-pass
      count: 1

      # Job provider uses exit code: 0 = pass/warning, non-zero = fail/error
      # (successCondition/failureCondition are not evaluated for Jobs)

      provider:
        job:
          spec:
            backoffLimit: 0
            # Direct synchronous call. 120s is generous; typical verdicts return
            # in 5-15s. Keep a small margin for dtctl init + DQL evaluation time.
            activeDeadlineSeconds: 120
            template:
              spec:
                restartPolicy: Never
                serviceAccountName: rollouts-srg-reader
                containers:
                  - name: dtctl
                    image: {{ .Values.analysis.dtctlImage }}
                    envFrom:
                      - secretRef:
                          name: dtctl-auth
                    env:
                      - name: APP_VERSION
                        value: {{ "\"{{args.app-version}}\"" }}
                      - name: CANARY_WEIGHT
                        value: {{ "\"{{args.canary-weight}}\"" }}
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        set -eo pipefail
                        OBJECT_ID="{{ .Values.analysis.guardianObjectId }}"
                        CANARY_STAGE="canary-${CANARY_WEIGHT}"

                        # ── 1. Authenticate dtctl against the platform URL ──
                        dtctl config set-credentials default-token --token "$DT_PLATFORM_TOKEN"
                        dtctl config set-context default \
                          --environment "$DT_PLATFORM_URL" \
                          --token-ref default-token \
                          --safety-level readwrite-all
                        dtctl config use-context default

                        # ── 2. Build payload and trigger guardian validation ──
                        echo "Triggering guardian for ${APP_VERSION} @ ${CANARY_STAGE}..." >&2

                        PAYLOAD=$(cat <<EOF
                        {
                          "objectId": "${OBJECT_ID}",
                          "timeframeInputType": "timeframeSelector",
                          "timeframeSelector": {"from": "now-10m", "to": "now"},
                          "variables": [
                            {"name": "app_version",   "definition": "${APP_VERSION}"},
                            {"name": "canary_stage",  "definition": "${CANARY_STAGE}"}
                          ]
                        }
                        EOF
                        )

                        RESULT=$(dtctl exec function \
                          dynatrace.site.reliability.guardian/validate-guardian-action \
                          --method POST --payload "$PAYLOAD" -o json --plain \
                          | tr -d '\000-\011\013-\037')

                        # ── 3. Extract verdict ──────────────────────────────
                        # dtctl envelopes vary across versions: body may be a
                        # JSON string, a parsed object, or nested under .result.
                        # This filter walks all common shapes in one pass.
                        VERDICT=$(echo "$RESULT" | jq -r '
                          ( .body // .result // . )
                          | if type == "string" then fromjson else . end
                          | ( .result // . )
                          | .validation_status // "unknown"
                        ')

                        # Per-objective log lines for the AnalysisRun output.
                        # Best-effort — never let a logging hiccup fail the Job.
                        echo "$RESULT" | jq -r '
                          ( .body // .result // . )
                          | if type == "string" then fromjson else . end
                          | ( .result // . )
                          | "Guardian: \(.guardian_name)\nValidation ID: \(.validation_id)\nVerdict: \(.validation_status | ascii_upcase)\nSummary: pass=\(.validation_summary.pass) warning=\(.validation_summary.warning) fail=\(.validation_summary.fail) error=\(.validation_summary.error)\nURL: \(.validation_url)"
                        ' >&2 2>/dev/null || true

                        echo "$RESULT" | jq -r '
                          ( .body // .result // . )
                          | if type == "string" then fromjson else . end
                          | ( .result // . )
                          | .validation_details[]?
                          | "  [\(.status | ascii_upcase)] \(.name): value=\(.value) target=\(.target) warning=\(.warning)"
                        ' >&2 2>/dev/null || true

                        # ── 4. Exit code drives the AnalysisRun verdict ─────
                        case "$VERDICT" in
                          pass|warning)
                            echo "Guardian verdict: ${VERDICT} → PASS" >&2
                            exit 0
                            ;;
                          fail|error)
                            echo "Guardian verdict: ${VERDICT} → FAIL" >&2
                            exit 1
                            ;;
                          *)
                            echo "Unknown guardian verdict: '${VERDICT}' → FAIL" >&2
                            echo "Raw dtctl response (first 2KB):" >&2
                            echo "$RESULT" | head -c 2048 >&2
                            exit 1
                            ;;
                        esac