# AnalysisTemplate — "Is the Site Reliability Guardian happy with this canary?"
#
# Single Job that:
#   1. Sends an SDLC bizevent to Dynatrace to trigger the guardian-validation workflow
#   2. Polls `dtctl get guardian-run` until the verdict is ready (pass/fail)
#
# The Dynatrace workflow receives the bizevent, runs the Site Reliability
# Guardian evaluation, and writes the verdict. This Job reads it back.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ .Values.analysis.templateName }}
  namespace: otel-demo
  labels:
    {{- include "checkout.labels" . | nindent 4 }}
spec:
  args:
    - name: app-version
    - name: canary-weight

  metrics:
    - name: srg-pass
      count: 1

      successCondition: "result == \"pass\""
      failureCondition: "result == \"fail\""

      provider:
        job:
          spec:
            backoffLimit: 1
            activeDeadlineSeconds: {{ mul .Values.analysis.pollIntervalSec .Values.analysis.pollCount }}
            template:
              spec:
                restartPolicy: Never
                serviceAccountName: rollouts-srg-reader
                containers:
                  - name: dtctl
                    image: {{ .Values.analysis.dtctlImage }}
                    envFrom:
                      - secretRef:
                          name: dtctl-auth
                    env:
                      - name: APP_VERSION
                        value: {{ "\"{{args.app-version}}\"" }}
                      - name: CANARY_WEIGHT
                        value: {{ "\"{{args.canary-weight}}\"" }}
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        set -euo pipefail
                        GUARDIAN="checkout-release-guardian"

                        # ── 1. Authenticate dtctl (same pattern as CI) ───────
                        dtctl config set-credentials default-token --token "$DT_API_TOKEN"
                        dtctl config set-context default \
                          --environment "$DT_ENVIRONMENT" \
                          --token-ref default-token \
                          --safety-level readwrite-all
                        dtctl config use-context default

                        # ── 2. Send SDLC bizevent → triggers the workflow ────
                        echo "Sending SDLC bizevent for ${APP_VERSION} at ${CANARY_WEIGHT}% weight..." >&2
                        curl -sf -X POST "${DT_ENVIRONMENT}/api/v2/bizevents/ingest" \
                          -H "Authorization: Api-Token ${DT_API_TOKEN}" \
                          -H "Content-Type: application/json" \
                          -d '{
                            "event.type": "validation.triggered",
                            "event.kind": "SDLC_EVENT",
                            "application": "checkout",
                            "version": "'"${APP_VERSION}"'",
                            "timeframe.from": "now-10m",
                            "timeframe.to": "now",
                            "execution_context": {
                              "version": "'"${APP_VERSION}"'",
                              "stage": "canary-'"${CANARY_WEIGHT}"'",
                              "application": "checkout"
                            }
                          }' >&2

                        echo "Bizevent sent. Waiting for Guardian evaluation..." >&2
                        sleep {{ .Values.analysis.pollIntervalSec }}

                        # ── 3. Poll for the verdict ──────────────────────────
                        for i in $(seq 1 {{ .Values.analysis.pollCount }}); do
                          VERDICT=$(dtctl get guardian-run \
                            --guardian "$GUARDIAN" \
                            --latest \
                            --output=json 2>/dev/null \
                            | jq -r '.verdict // empty' || true)

                          if [ "$VERDICT" = "pass" ] || [ "$VERDICT" = "fail" ]; then
                            echo "Guardian verdict: ${VERDICT}" >&2
                            echo "$VERDICT"
                            exit 0
                          fi

                          echo "Poll ${i}/{{ .Values.analysis.pollCount }}: verdict=${VERDICT:-pending}" >&2
                          sleep {{ .Values.analysis.pollIntervalSec }}
                        done

                        # Timeout — treat as failure
                        echo "Guardian evaluation timed out" >&2
                        echo "fail"
