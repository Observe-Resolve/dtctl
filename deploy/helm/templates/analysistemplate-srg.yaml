# AnalysisTemplate — "Is the Site Reliability Guardian happy with this canary?"
#
# Single Job that:
#   1. Sends an SDLC event to Dynatrace to trigger the guardian-validation workflow
#   2. Polls `dtctl get wfe` for the workflow execution, then reads the verdict
#      from `dtctl get wfe-task-result`
#
# The Dynatrace workflow receives the SDLC event, runs the Site Reliability
# Guardian evaluation. This Job reads back the verdict via workflow executions.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ .Values.analysis.templateName }}
  namespace: otel-demo
  labels:
    {{- include "checkout.labels" . | nindent 4 }}
spec:
  args:
    - name: app-version
    - name: canary-weight

  metrics:
    - name: srg-pass
      count: 1

      # Job provider uses exit code: 0 = pass, non-zero = fail
      # (successCondition/failureCondition are not evaluated for Jobs)

      provider:
        job:
          spec:
            backoffLimit: 0
            activeDeadlineSeconds: {{ mul .Values.analysis.pollIntervalSec .Values.analysis.pollCount }}
            template:
              spec:
                restartPolicy: Never
                serviceAccountName: rollouts-srg-reader
                containers:
                  - name: dtctl
                    image: {{ .Values.analysis.dtctlImage }}
                    envFrom:
                      - secretRef:
                          name: dtctl-auth
                    env:
                      - name: APP_VERSION
                        value: {{ "\"{{args.app-version}}\"" }}
                      - name: CANARY_WEIGHT
                        value: {{ "\"{{args.canary-weight}}\"" }}
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        set -euo pipefail
                        WORKFLOW_ID="{{ .Values.analysis.workflowId }}"

                        # ── 1. Authenticate dtctl against the platform (apps) URL ──
                        dtctl config set-credentials default-token --token "$DT_PLATFORM_TOKEN"
                        dtctl config set-context default \
                          --environment "$DT_PLATFORM_URL" \
                          --token-ref default-token \
                          --safety-level readwrite-all
                        dtctl config use-context default

                        # ── 2. Send SDLC event → triggers the workflow ─────
                        SEND_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                        echo "Sending SDLC event for ${APP_VERSION} at ${CANARY_WEIGHT}% weight..." >&2
                        curl -sf -X POST "${DT_ENVIRONMENT}/platform/ingest/v1/events.sdlc" \
                          -H "Authorization: Api-Token ${DT_API_TOKEN}" \
                          -H "Content-Type: application/json" \
                          -d '{
                            "event.type": "validation.triggered",
                            "event.status": "started",
                            "application": "checkout",
                            "version": "'"${APP_VERSION}"'",
                            "timeframe.from": "now-10m",
                            "timeframe.to": "now",
                            "execution_context": {
                              "version": "'"${APP_VERSION}"'",
                              "stage": "canary-'"${CANARY_WEIGHT}"'",
                              "application": "checkout"
                            }
                          }' >&2

                        echo "SDLC event sent. Waiting for workflow execution..." >&2
                        sleep {{ .Values.analysis.pollIntervalSec }}

                        # ── 3. Poll workflow executions for the verdict ────
                        for i in $(seq 1 {{ .Values.analysis.pollCount }}); do
                          # Find the latest execution for our workflow started after the event
                          EXEC_ID=$(dtctl get wfe -w "$WORKFLOW_ID" -o json 2>/dev/null \
                            | tr -d '\000-\011\013-\037' \
                            | jq -r '
                              [ .[] | select(.title == "checkout-release-validation") ]
                              | sort_by(.startedAt) | reverse | .[0].id // empty
                            ' || true)

                          if [ -n "$EXEC_ID" ]; then
                            STATE=$(dtctl get wfe "$EXEC_ID" -o json 2>/dev/null \
                              | tr -d '\000-\011\013-\037' \
                              | jq -r '.state // empty' || true)

                            if [ "$STATE" = "COMPLETED" ] || [ "$STATE" = "SUCCESS" ]; then
                              # Get the guardian verdict from the task result
                              VERDICT=$(dtctl get wfe-task-result "$EXEC_ID" \
                                --task run_validation -o json 2>/dev/null \
                                | tr -d '\000-\011\013-\037' \
                                | jq -r '.validation_status // empty' || true)

                              if [ "$VERDICT" = "pass" ] || [ "$VERDICT" = "warning" ]; then
                                echo "Guardian verdict: ${VERDICT} → PASS" >&2
                                exit 0
                              elif [ "$VERDICT" = "fail" ] || [ "$VERDICT" = "error" ]; then
                                echo "Guardian verdict: ${VERDICT} → FAIL" >&2
                                exit 1
                              fi
                              echo "Poll ${i}/{{ .Values.analysis.pollCount }}: execution completed, verdict=${VERDICT:-unknown}" >&2
                            elif [ "$STATE" = "ERROR" ]; then
                              echo "Workflow execution errored → FAIL" >&2
                              dtctl get wfe "$EXEC_ID" -o json 2>/dev/null \
                                | tr -d '\000-\011\013-\037' \
                                | jq -r '.stateInfo // empty' >&2 || true
                              exit 1
                            else
                              echo "Poll ${i}/{{ .Values.analysis.pollCount }}: execution=${EXEC_ID} state=${STATE}" >&2
                            fi
                          else
                            echo "Poll ${i}/{{ .Values.analysis.pollCount }}: no execution found yet" >&2
                          fi

                          sleep {{ .Values.analysis.pollIntervalSec }}
                        done

                        # Timeout — treat as failure
                        echo "Guardian evaluation timed out" >&2
                        echo "fail"
