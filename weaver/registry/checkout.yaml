# Semantic conventions for the checkout service.
# Validated in CI by `weaver registry check`.
# Breaking changes caught by `weaver registry diff` against baselines/main.

groups:
  # ── Attribute definitions ────────────────────────────────────────────────
  - id: checkout
    type: attribute_group
    prefix: checkout
    brief: "Attributes emitted by the checkout service."
    attributes:
      - id: customer.tier
        type:
          allow_custom_values: false
          members:
            - id: free
              value: "free"
            - id: plus
              value: "plus"
            - id: enterprise
              value: "enterprise"
        requirement_level: required
        stability: stable
        brief: "Customer subscription tier for the order."
        examples: ["enterprise"]

      - id: payment.method
        type:
          allow_custom_values: false
          members:
            - id: credit_card
              value: "credit_card"
            - id: paypal
              value: "paypal"
            - id: wallet
              value: "wallet"
        requirement_level: required
        stability: stable
        brief: "Payment method used for the order."
        examples: ["credit_card"]

      - id: cart.size
        type: int
        requirement_level: recommended
        stability: experimental
        brief: "Number of distinct line items in the cart at checkout."
        examples: [1, 5]

      - id: order.total_usd
        type: double
        requirement_level: recommended
        stability: stable
        brief: "Order total in USD (pre-tax)."
        examples: [129.99]

  # ── Span definitions ─────────────────────────────────────────────────────
  - id: checkout.place_order
    type: span
    span_kind: server
    prefix: checkout
    brief: "Span emitted when the checkout service places an order."
    attributes:
      - ref: checkout.customer.tier
      - ref: checkout.payment.method
      - ref: checkout.cart.size
      - ref: checkout.order.total_usd