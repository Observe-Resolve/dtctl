groups:
  # ── Attribute definitions ────────────────────────────────────────────────
  - id: payment
    type: attribute_group
    brief: "Payment service span attributes."
    attributes:
      - id: payment.provider
        type: string
        requirement_level: required
        stability: stable
        brief: "Which external processor handled the charge."
        examples: ["stripe", "adyen"]

      - id: payment.amount_usd
        type: double
        requirement_level: required
        stability: stable
        brief: "Charge amount in USD."
        examples: [129.99]

      - id: payment.outcome
        type:
          allow_custom_values: false
          members:
            - id: success
              value: "success"
              stability: stable
            - id: declined
              value: "declined"
              stability: stable
            - id: error
              value: "error"
              stability: stable
        requirement_level: required
        stability: stable
        brief: "Terminal outcome of the charge."

  # ── Span definitions ─────────────────────────────────────────────────────
  - id: payment.charge
    type: span
    span_kind: internal
    stability: stable
    brief: "Span around the provider call."
    attributes:
      - ref: payment.provider
      - ref: payment.amount_usd
      - ref: payment.outcome