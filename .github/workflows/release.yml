# Release pipeline — runs on every semver tag push.
#
# Three jobs, dependency-chained:
#   1. build-checkout   — docker build + push ghcr.io/.../checkout:$TAG
#   2. apply-dtctl      — stamp + apply dashboards / SLOs / Guardian to Dynatrace
#   3. promote-via-argo — bump deploy/helm/values.yaml's image.tag → git push
#                         Argo CD reconciles → Argo Rollouts kicks off the canary
#
# CI ends here. From this point on the cluster owns the release:
#   - Argo CD reconciles within seconds
#   - Argo Rollouts walks the canary 10% → 50% → 100% with the SRG analysis between steps
#   - Pass: canary promotes to 100%
#   - Fail: AnalysisRun trips, Rollouts aborts the canary, traffic stays on the previous tag
#
# Watch the rollout in the Argo Rollouts UI. Dashboards and SLOs are
# version-agnostic so an aborted canary requires no dtctl cleanup —
# Argo simply drains the canary pods.
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write       # to push the values bump back to main
  packages: write       # to push the image to ghcr.io

env:
  APP_VERSION: ${{ github.ref_name }}
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/checkout

jobs:
  ############################################################################
  # 1. Build + push the checkout image
  ############################################################################
  build-checkout:
    name: Build + push checkout image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.APP_VERSION }}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ env.APP_VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            app.version=${{ env.APP_VERSION }}

      - name: Build + push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: demo-app/services/checkout
          file: demo-app/services/checkout/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ##############################################################################
  # 2. Apply dtctl manifests (dashboards, SLOs, workflows, Guardian)
  ##############################################################################
  apply-dtctl:
    name: Apply dtctl manifests + Guardian
    needs: build-checkout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dtctl
        run: |
          curl -fsSL https://raw.githubusercontent.com/dynatrace-oss/dtctl/main/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          dtctl version

      - name: dtctl auth
        env:
          DT_API_TOKEN:   ${{ secrets.DT_API_TOKEN }}
          DT_ENVIRONMENT: ${{ secrets.DT_ENVIRONMENT }}
        run: |
          dtctl config set-credentials default-token --token "$DT_API_TOKEN"
          dtctl config set-context default \
            --environment "$DT_ENVIRONMENT" \
            --token-ref default-token \
            --safety-level readwrite-all
          dtctl config use-context default

      - name: Upload lookup tables (baseline metrics)
        run: |
          # Lookup tables must be uploaded before workflows that reference them
          dtctl create lookup -f dtctl/lookups/service-baselines.yaml --plain || \
            echo "Lookup table already exists or upload failed (non-fatal)"

      - name: Render + apply dashboards / workflows / Guardian
        run: |
          # Strip 'v' prefix to match telemetry tags (app.version in OTEL attributes)
          export APP_VERSION="${{ env.APP_VERSION }}"
          export APP_VERSION="${APP_VERSION#v}"

          ./scripts/stamp-version.sh | tee /tmp/rendered.yaml >/dev/null
          dtctl diff -f /tmp/rendered.yaml || true
          dtctl apply -f /tmp/rendered.yaml

      - name: Upsert SLOs (create or update — long-lived, no version suffix)
        run: |
          for slo in dtctl/slos/*.yaml; do
            echo "Upserting SLO: $slo"
            dtctl create slo -f "$slo" 2>/dev/null || \
              dtctl update slo -f "$slo" 2>/dev/null || \
              echo "Warning: SLO upsert failed for $slo (non-fatal)"
          done

      # NOTE: The SDLC bizevent that triggers the Guardian evaluation is sent
      # by the Argo Rollouts AnalysisTemplate — NOT here. This ensures the
      # Guardian evaluates canary traffic that is actually flowing, not stale
      # pre-deploy data. See deploy/helm/templates/analysistemplate-srg.yaml.

  ##############################################################################
  # 3. Bump deploy/helm/values.yaml — Argo CD reconciles from here
  ##############################################################################
  promote-via-argo:
    name: Bump image tag (Argo CD reconciles)
    needs: apply-dtctl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rewrite deploy/helm/values.yaml (image.tag + appVersion)
        run: |
          # Strip 'v' prefix to match Docker tag (semver pattern strips it)
          VERSION="${APP_VERSION#v}"

          # Both fields must move together so the chart renders with a consistent version.
          sed -i "s|^  tag:.*|  tag: ${VERSION}|"        deploy/helm/values.yaml
          sed -i "s|^appVersion:.*|appVersion: ${VERSION}|" deploy/helm/values.yaml

          # Sanity check
          grep -E "^  tag:|^appVersion:" deploy/helm/values.yaml

      - name: Commit + push
        run: |
          git config user.name  "observe-resolve-bot"
          git config user.email "bot@observe-resolve.dev"
          git add deploy/helm/values.yaml
          if git diff --staged --quiet; then
            echo "No changes to values.yaml - already at ${APP_VERSION}"
          else
            git commit -m "release(${APP_VERSION}): bump checkout image tag"
            git push
          fi

      - name: Summary
        run: |
          {
            echo "### :rocket: Released \`${APP_VERSION}\`"
            echo ""
            echo "- Image pushed: \`${IMAGE_REPO}:${APP_VERSION}\`"
            echo "- dtctl manifests applied to Dynatrace"
            echo "- \`deploy/helm/values.yaml\` bumped — Argo CD will reconcile"
            echo ""
            echo "Watch the Rollout in the Argo Rollouts UI:"
            echo "\`\`\`"
            echo "kubectl-argo-rollouts -n otel-demo get rollout checkout --watch"
            echo "\`\`\`"
            echo ""
            echo "If the canary is aborted by the Site Reliability Guardian, roll dashboards back with:"
            echo "\`\`\`"
            echo "make rollback TAG=<previous-tag>"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
