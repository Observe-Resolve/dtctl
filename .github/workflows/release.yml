# Release pipeline — runs on every semver tag push.
#
# Three jobs, dependency-chained:
#   1. build-checkout   — docker build + push ghcr.io/.../checkout:$TAG
#   2. apply-dtctl      — stamp + apply dashboards / SLOs / Guardian to Dynatrace
#   3. promote-via-argo — bump deploy/helm/values.yaml's image.tag → git push
#                         Argo CD reconciles → Argo Rollouts kicks off the canary
#
# CI ends here. From this point on the cluster owns the release:
#   - Argo CD reconciles within seconds
#   - Argo Rollouts walks the canary 10% → 50% → 100% with the SRG analysis between steps
#   - Pass: canary promotes to 100%
#   - Fail: AnalysisRun trips, Rollouts aborts the canary, traffic stays on the previous tag
#
# Watch the rollout in the Argo Rollouts UI. To roll back the dtctl manifests
# after an aborted release, run `make rollback TAG=<previous-tag>` locally —
# that re-stamps dashboards/SLOs/Guardian to whatever version is actually
# serving traffic.
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write       # to push the values bump back to main
  packages: write       # to push the image to ghcr.io

env:
  APP_VERSION: ${{ github.ref_name }}
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/checkout

jobs:
  ############################################################################
  # 1. Build + push the checkout image
  ############################################################################
  build-checkout:
    name: Build + push checkout image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.APP_VERSION }}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ env.APP_VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            app.version=${{ env.APP_VERSION }}

      - name: Build + push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: demo-app/services/checkout
          file: demo-app/services/checkout/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ##############################################################################
  # 2. Apply dtctl manifests (dashboards, SLOs, workflows, Guardian)
  ##############################################################################
  apply-dtctl:
    name: Apply dtctl manifests + Guardian
    needs: build-checkout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dtctl
        run: |
          curl -fsSL https://github.com/dynatrace-oss/dtctl/releases/latest/download/dtctl-linux-amd64 \
            -o /usr/local/bin/dtctl && chmod +x /usr/local/bin/dtctl

      - name: dtctl auth
        env:
          OAUTH_CLIENT_ID:     ${{ secrets.DT_OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.DT_OAUTH_CLIENT_SECRET }}
          DT_ENVIRONMENT:      ${{ secrets.DT_ENVIRONMENT }}
        run: |
          dtctl auth login --oauth-client-id "$OAUTH_CLIENT_ID" \
                           --oauth-client-secret "$OAUTH_CLIENT_SECRET" \
                           --env "$DT_ENVIRONMENT"
          dtctl auth verify

      - name: Render + apply dashboards / SLOs / workflows / Guardian
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: |
          ./scripts/stamp-version.sh | tee /tmp/rendered.yaml >/dev/null
          dtctl diff -f /tmp/rendered.yaml || true
          dtctl apply -f /tmp/rendered.yaml

  ##############################################################################
  # 3. Bump deploy/helm/values.yaml — Argo CD reconciles from here
  ##############################################################################
  promote-via-argo:
    name: Bump image tag (Argo CD reconciles)
    needs: apply-dtctl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rewrite deploy/helm/values.yaml (image.tag + appVersion)
        run: |
          # Both fields must move together so the chart renders with a consistent version.
          sed -i "s|^  tag:.*|  tag: ${APP_VERSION}|"        deploy/helm/values.yaml
          sed -i "s|^appVersion:.*|appVersion: ${APP_VERSION}|" deploy/helm/values.yaml

          # Sanity check
          grep -E "^  tag:|^appVersion:" deploy/helm/values.yaml

      - name: Commit + push
        run: |
          git config user.name  "observe-resolve-bot"
          git config user.email "bot@observe-resolve.dev"
          git add deploy/helm/values.yaml
          git commit -m "release(${APP_VERSION}): bump checkout image tag"
          git push

      - name: Summary
        run: |
          {
            echo "### :rocket: Released \`${APP_VERSION}\`"
            echo ""
            echo "- Image pushed: \`${IMAGE_REPO}:${APP_VERSION}\`"
            echo "- dtctl manifests applied to Dynatrace"
            echo "- \`deploy/helm/values.yaml\` bumped — Argo CD will reconcile"
            echo ""
            echo "Watch the Rollout in the Argo Rollouts UI:"
            echo "\`\`\`"
            echo "kubectl-argo-rollouts -n otel-demo get rollout checkout --watch"
            echo "\`\`\`"
            echo ""
            echo "If the canary is aborted by the Site Reliability Guardian, roll dashboards back with:"
            echo "\`\`\`"
            echo "make rollback TAG=<previous-tag>"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
