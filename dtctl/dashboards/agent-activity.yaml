# Agent activity dashboard — OPTIONAL BONUS, not applied by the episode scenarios.
#
# The on-camera scenarios for Ep. 09 do NOT apply this dashboard. It exists for
# practitioners who want to instrument their own Claude Code runs via
# scripts/run-instrumented.sh + weaver/registry/_agent.yaml and see the agent's
# behavior alongside production telemetry.
#
# Skip freely. Nothing in the main path depends on it.
name: "agent-activity"
type: dashboard
content:
  annotations: []
  importedWithCode: false
  settings:
    defaultTimeframe:
      enabled: true
      value:
        from: now()-24h
        to: now()
  layouts:
    "1":
      x: 0
      "y": 0
      w: 24
      h: 3
    "2":
      x: 0
      "y": 3
      w: 8
      h: 5
    "3":
      x: 8
      "y": 3
      w: 8
      h: 5
    "4":
      x: 16
      "y": 3
      w: 8
      h: 5
    "5":
      x: 0
      "y": 8
      w: 12
      h: 6
    "6":
      x: 12
      "y": 8
      w: 12
      h: 6
    "7":
      x: 0
      "y": 14
      w: 12
      h: 6
    "8":
      x: 12
      "y": 14
      w: 12
      h: 6
  tiles:
    "1":
      title: ""
      type: markdown
      content: |
        ### Agent activity — **${APP_VERSION}**

        Every Claude Code run on this repo is wrapped in an OpenTelemetry span
        by scripts/run-instrumented.sh. This dashboard aggregates those spans
        so the agent's behavior is observable in the same tenant as the
        production telemetry it works on.
    "2":
      title: "Runs (last 24h)"
      type: data
      query: |
        fetch spans, from:now()-24h
        | filter service.name == "claude-code-agent"
        | summarize runs = count()
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Total Runs"
          recordField: runs
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true
    "3":
      title: "Error rate (last 24h)"
      type: data
      query: |
        fetch spans, from:now()-24h
        | filter service.name == "claude-code-agent"
        | summarize err = countIf(outcome == "error") * 100.0 / count()
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Error Rate"
          recordField: err
        thresholds:
          - field: err
            id: 1
            isEnabled: true
            rules:
              - color:
                  Default: "#2f6862"
                comparator: "<="
                id: 0
                value: 5
              - color:
                  Default: "#eea53c"
                comparator: "<="
                id: 1
                value: 15
              - color:
                  Default: "#c62239"
                comparator: ">"
                id: 2
                value: 15
        unitsOverrides:
          - identifier: err
            unit: "%"
            decimals: 2
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true
    "4":
      title: "p95 resolution time"
      type: data
      query: |
        fetch spans, from:now()-24h
        | filter service.name == "claude-code-agent"
        | filter span.name == "agent.repair_drift_ticket"
        | summarize p95 = percentile(duration, 95) / 1000000000
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "p95 Resolution Time"
          recordField: p95
        unitsOverrides:
          - identifier: p95
            baseUnit: second
            displayUnit: null
            decimals: 1
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true
    "5":
      title: "Runs per hour — by outcome"
      type: data
      query: |
        fetch spans, from:now()-24h
        | filter service.name == "claude-code-agent"
        | makeTimeseries runs = count(), interval:15m, by:{outcome}
      visualization: lineChart
      visualizationSettings:
        autoSelectVisualization: false
        chartSettings:
          legend:
            position: bottom
            showLegend: true
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true
    "6":
      title: "Tool-call fanout (children per run, p50 / p95)"
      type: data
      query: |
        fetch spans, from:now()-24h
        | filter service.name == "claude-code-agent"
        | summarize p50 = percentile(tools.called, 50),
                    p95 = percentile(tools.called, 95),
                    by:{span.name}
      visualization: barChart
      visualizationSettings:
        autoSelectVisualization: false
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true
    "7":
      title: "Per-ticket resolution time (last 7 days)"
      type: data
      query: |
        fetch spans, from:now()-7d
        | filter service.name == "claude-code-agent"
        | filter span.name == "agent.repair_drift_ticket"
        | summarize duration_s = max(duration) / 1000000000,
                    outcome = takeFirst(outcome),
                    files = takeFirst(files.changed),
                    tools = takeFirst(tools.called),
                    by:{ticket.id}
        | sort duration_s desc
        | limit 25
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: true
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true
    "8":
      title: "Error rate by skill stack"
      type: data
      query: |
        fetch spans, from:now()-7d
        | filter service.name == "claude-code-agent"
        | summarize err = countIf(outcome == "error") * 100.0 / count(),
                    runs = count(),
                    by:{skill.names}
        | filter runs >= 5
        | sort err desc
      visualization: barChart
      visualizationSettings:
        autoSelectVisualization: false
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true
