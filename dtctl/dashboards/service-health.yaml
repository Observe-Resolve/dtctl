# Service health dashboard for the otel-demo namespace.
# Long-lived: no version in the name. Use the $version variable to filter by release.
name: "otel-demo-service-health"
type: dashboard
content:
  annotations: []
  importedWithCode: false
  settings:
    defaultTimeframe:
      enabled: true
      value:
        from: now()-2h
        to: now()
  variables:
    - id: version
      type: query
      label: "Release version"
      visible: true
      defaultValue: "*"
      multiple: false
      query: |
        fetch spans, from:now()-2h
        | filter k8s.cluster.name == "observeresolve-ep9-demo"
        | filter k8s.namespace.name == "otel-demo"
        | summarize by:{service.version}
        | fields version = service.version
        | sort version desc
  layouts:
    "1":
      x: 0
      "y": 0
      w: 24
      h: 3
    "2":
      x: 0
      "y": 3
      w: 6
      h: 4
    "3":
      x: 0
      "y": 7
      w: 12
      h: 6
    "4":
      x: 12
      "y": 7
      w: 12
      h: 6
    "5":
      x: 0
      "y": 13
      w: 12
      h: 5
    "6":
      x: 12
      "y": 13
      w: 12
      h: 5
    "7":
      x: 0
      "y": 18
      w: 24
      h: 6
  tiles:
    "1":
      title: ""
      type: markdown
      content: |
        ### otel-demo · service health

        Use the **Release version** dropdown to filter by a specific release.
        Every tile filters on `k8s.cluster.name == "observeresolve-ep9-demo"` to isolate telemetry from the demo cluster.
    "2":
      title: "Active release"
      type: data
      query: |
        fetch spans, from:now()-5m
        | filter k8s.cluster.name == "observeresolve-ep9-demo"
        | filter k8s.namespace.name == "otel-demo"
        | summarize count = count(), by:{service.version}
        | sort count desc
        | limit 1
        | fields version = service.version
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Active Release"
          recordField: version
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true
    "3":
      title: "Request rate per service"
      type: data
      query: |
        fetch spans, from:now()-1h
        | filter span.kind == "server"
        | filter k8s.cluster.name == "observeresolve-ep9-demo"
        | filter k8s.namespace.name == "otel-demo"
        | filter $version == "*" OR service.version == $version
        | makeTimeseries req = count(), interval:1m, by:{service.name}
      visualization: lineChart
      visualizationSettings:
        autoSelectVisualization: false
        chartSettings:
          legend:
            position: bottom
            showLegend: true
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true
    "4":
      title: "p95 latency per service"
      type: data
      query: |
        fetch spans, from:now()-30m
        | filter span.kind == "server"
        | filter k8s.cluster.name == "observeresolve-ep9-demo"
        | filter $version == "*" OR service.version == $version
        | summarize p95 = percentile(duration, 95) / 1000000, by:{service.name}
        | sort p95 desc
      visualization: barChart
      visualizationSettings:
        autoSelectVisualization: false
        unitsOverrides:
          - identifier: p95
            baseUnit: millisecond
            displayUnit: null
            decimals: 1
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true
    "5":
      title: "Checkout PlaceOrder count (1h)"
      type: data
      query: |
        fetch spans, from:now()-1h
        | filter service.name == "checkout"
        | filter span.name == "oteldemo.CheckoutService/PlaceOrder"
        | filter k8s.cluster.name == "observeresolve-ep9-demo"
        | filter $version == "*" OR service.version == $version
        | makeTimeseries orders = count(), interval:5m
      visualization: lineChart
      visualizationSettings:
        autoSelectVisualization: false
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true
    "6":
      title: "Checkout error rate (5m)"
      type: data
      query: |
        fetch spans, from:now()-5m
        | filter service.name == "checkout"
        | filter k8s.cluster.name == "observeresolve-ep9-demo"
        | filter $version == "*" OR service.version == $version
        | summarize err = countIf(status == "ERROR") * 100.0 / count()
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Error Rate"
          recordField: err
        thresholds:
          - field: err
            id: 1
            isEnabled: true
            rules:
              - color:
                  Default: "#2f6862"
                comparator: "<="
                id: 0
                value: 1
              - color:
                  Default: "#eea53c"
                comparator: "<="
                id: 1
                value: 3
              - color:
                  Default: "#c62239"
                comparator: ">"
                id: 2
                value: 3
        unitsOverrides:
          - identifier: err
            unit: "%"
            decimals: 2
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true
    "7":
      title: "Checkout errors by exception type"
      type: data
      query: |
        fetch spans, from:now()-1h
        | filter service.name == "checkout" and status == "ERROR"
        | filter k8s.cluster.name == "observeresolve-ep9-demo"
        | filter $version == "*" OR service.version == $version
        | summarize errors = count(),
                    avg_duration_ms = avg(duration) / 1000000,
                    by:{exception.type, span.name}
        | sort errors desc
        | limit 20
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: true
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true
