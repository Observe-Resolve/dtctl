# Service health dashboard for the otel-demo namespace.
# Long-lived: no version in the name. Scoped to k8s.namespace.name == "otel-demo".
name: "otel-demo-service-health"
id: "ff4572a9-fac8-4dca-9699-dcf00d7cc938"
type: dashboard
content:
  annotations: []
  importedWithCode: false
  settings:
    defaultTimeframe:
      enabled: true
      value:
        from: now()-2h
        to: now()
  layouts:
    "1":
      h: 3
      w: 24
      x: 0
      "y": 0
    "2":
      h: 4
      w: 12
      x: 0
      "y": 3
    "3":
      h: 4
      w: 12
      x: 12
      "y": 3
    "4":
      h: 6
      w: 12
      x: 0
      "y": 7
    "5":
      h: 6
      w: 12
      x: 12
      "y": 7
    "6":
      h: 5
      w: 12
      x: 0
      "y": 13
    "7":
      h: 5
      w: 12
      x: 12
      "y": 13
    "8":
      h: 6
      w: 12
      x: 0
      "y": 18
    "9":
      h: 6
      w: 12
      x: 12
      "y": 18
  tiles:
    "1":
      content: |
        ### otel-demo · service health

        All tiles are scoped to `k8s.namespace.name == "otel-demo"`.
      type: markdown
    "2":
      davis:
        davisVisualization:
          isAvailable: true
        enabled: false
      query: |
        fetch spans, from:now()-5m
        | filter k8s.namespace.name == "otel-demo"
        | summarize count = count(), by:{service.name}
        | sort count desc
      querySettings:
        defaultSamplingRatio: 10
        defaultScanLimitGbytes: 500
        enableSampling: false
        maxResultMegaBytes: 1
        maxResultRecords: 1000
      title: Active services
      type: data
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: true
    "3":
      davis:
        davisVisualization:
          isAvailable: true
        enabled: false
      query: |
        fetch spans, from:now()-5m
        | filter k8s.namespace.name == "otel-demo"
        | summarize total = count(),
                    errors = countIf(span.status_code == "error"),
                    by:{service.name}
        | fieldsAdd error_rate = asDouble(errors) * 100.0 / asDouble(total)
        | sort error_rate desc
      querySettings:
        defaultSamplingRatio: 10
        defaultScanLimitGbytes: 500
        enableSampling: false
        maxResultMegaBytes: 1
        maxResultRecords: 1000
      title: Error rate per service (5m)
      type: data
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: true
    "4":
      davis:
        davisVisualization:
          isAvailable: true
        enabled: false
      query: |
        fetch spans, from:now()-1h
        | filter k8s.namespace.name == "otel-demo"
        | makeTimeseries req = count(), interval:1m, by:{service.name}
      querySettings:
        defaultSamplingRatio: 10
        defaultScanLimitGbytes: 500
        enableSampling: false
        maxResultMegaBytes: 1
        maxResultRecords: 1000
      title: Request rate per service
      type: data
      visualization: lineChart
      visualizationSettings:
        autoSelectVisualization: false
        chartSettings:
          legend:
            position: bottom
    "5":
      davis:
        davisVisualization:
          isAvailable: true
        enabled: false
      query: |
        fetch spans, from:now()-30m
        | filter k8s.namespace.name == "otel-demo"
        | summarize p95 = percentile(duration, 95) / 1000000, by:{service.name}
        | sort p95 desc
      querySettings:
        defaultSamplingRatio: 10
        defaultScanLimitGbytes: 500
        enableSampling: false
        maxResultMegaBytes: 1
        maxResultRecords: 1000
      title: p95 latency per service
      type: data
      visualization: categoricalBarChart
      visualizationSettings:
        autoSelectVisualization: false
        unitsOverrides:
          - added: 1.777381830818e+12
            baseUnit: millisecond
            cascade: null
            decimals: 1
            delimiter: false
            displayUnit: null
            identifier: p95
            suffix: ""
    "6":
      davis:
        davisVisualization:
          isAvailable: true
        enabled: false
      query: |
        fetch spans, from:now()-1h
        | filter service.name == "checkout"
        | filter span.name == "oteldemo.CheckoutService/PlaceOrder"
        | makeTimeseries orders = count(), interval:5m
      querySettings:
        defaultSamplingRatio: 10
        defaultScanLimitGbytes: 500
        enableSampling: false
        maxResultMegaBytes: 1
        maxResultRecords: 1000
      title: Checkout PlaceOrder count (1h)
      type: data
      visualization: lineChart
      visualizationSettings:
        autoSelectVisualization: false
    "7":
      davis:
        davisVisualization:
          isAvailable: true
        enabled: false
      query: |
        fetch spans, from:now()-5m
        | filter service.name == "checkout"
        | summarize err = countIf(span.status_code == "error") * 100.0 / count()
      querySettings:
        defaultSamplingRatio: 10
        defaultScanLimitGbytes: 500
        enableSampling: false
        maxResultMegaBytes: 1
        maxResultRecords: 1000
      title: Checkout error rate (5m)
      type: data
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        coloring:
          colorRules:
            - colorMode: custom-color
              comparator: '>'
              customColor:
                Default: '#c62239'
              field: err
              value: 3
        singleValue:
          label: Error Rate
          recordField: err
        unitsOverrides:
          - added: 1.77738183082e+12
            baseUnit: '%'
            cascade: null
            decimals: 2
            delimiter: false
            identifier: err
            suffix: ""
    "8":
      davis:
        davisVisualization:
          isAvailable: true
        enabled: false
      query: |
        fetch spans, from:now()-1h
        | filter service.name == "checkout" and span.status_code == "error"
        | summarize errors = count(),
                    avg_duration_ms = avg(duration) / 1000000,
                    by:{exception.type, span.name}
        | sort errors desc
        | limit 20
      querySettings:
        defaultSamplingRatio: 10
        defaultScanLimitGbytes: 500
        enableSampling: false
        maxResultMegaBytes: 1
        maxResultRecords: 1000
      title: Checkout errors by exception type
      type: data
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: true
    "9":
      davis:
        davisVisualization:
          isAvailable: true
        enabled: false
      query: |
        fetch spans, from:now()-1h
        | filter service.name == "checkout"
        | filter span.name == "oteldemo.CheckoutService/PlaceOrder"
        | filter isNotNull(customer.tier)
        | summarize orders = count(), by:{customer.tier}
        | sort orders desc
      querySettings:
        defaultSamplingRatio: 10
        defaultScanLimitGbytes: 500
        enableSampling: false
        maxResultMegaBytes: 1
        maxResultRecords: 1000
      title: Orders by customer tier (1h)
      type: data
      visualization: categoricalBarChart
      visualizationSettings:
        autoSelectVisualization: false
  variables: []
  version: 22
