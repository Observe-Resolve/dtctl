# Site Reliability Guardian — release gate for checkout.
# Applied on every release by .github/workflows/release.yml.
# Evaluates three objectives for the newly-deployed APP_VERSION.
#
# Once applied, Dynatrace automatically evaluates the guardian. The Argo Rollouts
# AnalysisTemplate polls `dtctl get guardian-run` for the verdict.

schemaId: "app:dynatrace.site.reliability.guardian:guardians"
scope: "environment"
value:
  name: "checkout-release-${APP_VERSION}"
  description: "Post-deploy validation for checkout release ${APP_VERSION}."
  tags:
    - "owner:observe-and-resolve"
    - "episode:09"
    - "release:${APP_VERSION}"
    - "kind:release-gate"

  variables:
    - name: "app_version"
      definition: "${APP_VERSION}"

  objectives:
    - name: "checkout-availability"
      description: "Successful CheckoutService/PlaceOrder ratio over the evaluation window."
      objectiveType: "DQL"
      dqlQuery: |
        fetch spans
        | filter service.name == "checkout"
        | filter span.name == "oteldemo.CheckoutService/PlaceOrder"
        | filter k8s.cluster.name == "observeresolve-ep9-demo"
        | summarize ok = countIf(status != "ERROR") * 100.0 / count()
      displayUnit:
        base: "percent"
        display: "%"
        decimals: 2
      comparisonOperator: "GREATER_THAN_OR_EQUAL"
      target: 99.0
      warning: 99.5
      segments: []
      links: []

    - name: "frontend-p95-latency"
      description: "Frontend p95 latency must stay under 200ms."
      objectiveType: "DQL"
      dqlQuery: |
        fetch spans
        | filter service.name == "frontend" and span.kind == "server"
        | filter k8s.cluster.name == "observeresolve-ep9-demo"
        | summarize p95 = percentile(duration, 95) / 1000000
      displayUnit:
        base: "millisecond"
        display: "ms"
        decimals: 1
      comparisonOperator: "LESS_THAN_OR_EQUAL"
      target: 200
      warning: 150
      segments: []
      links: []

    - name: "error-budget-burn-rate"
      description: "Multi-window burn-rate composite (1h fast burn). Fail > 1.0."
      objectiveType: "DQL"
      dqlQuery: |
        fetch spans
        | filter service.name == "checkout"
        | filter k8s.cluster.name == "observeresolve-ep9-demo"
        | summarize
            errors = countIf(status == "ERROR"),
            total = count()
        | fieldsAdd burn = (errors / total) / 0.01
      comparisonOperator: "LESS_THAN_OR_EQUAL"
      target: 1.0
      warning: 0.5
      segments: []
      links: []

  eventKind: "SDLC_EVENT"
