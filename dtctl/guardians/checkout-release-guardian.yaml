# Site Reliability Guardian — release gate for checkout.
# Applied on every release by .github/workflows/release.yml.
# Evaluates three objectives for the newly-deployed version.
#
# Long-lived: no version in the name. Same guardian is reused across releases.
# Dynatrace detects the active version via service.version / app.kubernetes.io/version.

objectId: "vu9U3hXa3q0AAAABADFhcHA6ZHluYXRyYWNlLnNpdGUucmVsaWFiaWxpdHkuZ3VhcmRpYW46Z3VhcmRpYW5zAAZ0ZW5hbnQABnRlbmFudAAkNzY0YmU4YTEtNWFmMy0zZTJiLTlkODYtZjM1OGI3ODIwNjNkvu9U3hXa3q0"
schemaId: "app:dynatrace.site.reliability.guardian:guardians"
scope: "environment"
value:
  name: "checkout-release-guardian"
  description: "Post-deploy validation for checkout releases."
  tags:
    - "owner:observe-and-resolve"
    - "episode:09"
    - "kind:release-gate"

  objectives:
    - name: "checkout-availability"
      description: "Successful CheckoutService/PlaceOrder ratio over the evaluation window."
      objectiveType: "DQL"
      dqlQuery: |
        fetch spans
        | filter service.name == "checkout"
        | filter span.name == "oteldemo.CheckoutService/PlaceOrder"
        | summarize total = count(), good = countIf(span.status_code == "error")
        | fieldsAdd ok = ((asLong(total) - asLong(good)) / asLong(total)) * 100.0
      displayUnit:
        base: "percent"
        display: "%"
        decimals: 2
      comparisonOperator: "GREATER_THAN_OR_EQUAL"
      target: 99.0
      warning: 99.5
      segments: []
      links: []

    - name: "checkout-p95-latency"
      description: "Checkout PlaceOrder p95 latency must stay under 200ms."
      objectiveType: "DQL"
      dqlQuery: |
        fetch spans
        | filter service.name == "checkout"
        | filter span.name == "oteldemo.CheckoutService/PlaceOrder"
        | summarize p95 = percentile(duration, 95) / 1000000
      displayUnit:
        base: "millisecond"
        display: "ms"
        decimals: 1
      comparisonOperator: "LESS_THAN_OR_EQUAL"
      target: 200
      warning: 150
      segments: []
      links: []

    - name: "checkout-latency-burn"
      description: "Fraction of checkout requests exceeding 200ms latency budget. Burn > 1.0 means the budget is consumed faster than allowed (5% budget)."
      objectiveType: "DQL"
      dqlQuery: |
        fetch spans
        | filter service.name == "checkout"
        | filter span.name == "oteldemo.CheckoutService/PlaceOrder"
        | summarize
            slow = countIf(duration / 1000000 > 200),
            total = count()
        | fieldsAdd burn = (asDouble(slow) / asDouble(total)) / 0.05
      comparisonOperator: "LESS_THAN_OR_EQUAL"
      target: 1.0
      warning: 0.5
      segments: []
      links: []

  eventKind: "SDLC_EVENT"
