# Frontend latency SLO — scoped to the demo cluster.
# Long-lived: no version suffix. Use the dashboard variable to filter by release.
type: slo
name: "frontend-latency"
enabled: true
customDescription: "Frontend server requests served under 200ms."
customSli:
  indicator: |
    fetch spans
    | filter service.name == "frontend" and span.kind == "server"
    | summarize total = count(), fast = countIf(duration / 1000000 < 200)
    | fieldsAdd sli = (asLong(fast) / asLong(total)) * 100
criteria:
  - name: "frontend-latency"
    target: 95.0
    warning: 98.0
    comparisonOperator: "GREATER_THAN_OR_EQUAL"
    timeframeFrom: "now()-7d"
    timeframeTo: "now()"
