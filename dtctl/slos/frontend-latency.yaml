# Frontend p95 latency SLO — scoped to the release.
apiVersion: platform.dynatrace.io/v1
kind: SLO
metadata:
  name: frontend-p95-latency
  labels:
    owner: observe-and-resolve
    episode: "09"
    release: ${APP_VERSION}
    service: frontend
spec:
  description: "Frontend p95 request latency stays under 200ms for release ${APP_VERSION}."
  target: 95.0
  warning: 98.0
  evaluationWindow: "P7D"
  sli:
    type: threshold
    metric: |
      fetch spans, from:now()-7d
      | filter service.name == "frontend" and span.kind == "server"
      | filter app.version == "${APP_VERSION}"
      | summarize p95 = percentile(duration, 95), by: {bin(timestamp, 1m)}
    comparison: lessThan
    thresholdMillis: 200
