# Checkout availability SLO — scoped to the demo cluster.
# Long-lived: no version suffix. Use the dashboard variable to filter by release.
type: slo
id: "vu9U3hXa3q0AAAABAClidWlsdGluOmludGVybmFsLnNlcnZpY2UubGV2ZWwub2JqZWN0aXZlcwAGdGVuYW50AAZ0ZW5hbnQAJGVjNzZiNzZhLWQ5ZDYtMzI5Ny1hMjUwLWNkNGJiYjRiZDkyZL7vVN4V2t6t"
name: "checkout-availability"
enabled: true
customDescription: "Successful checkout PlaceOrder ratio over 7 days."
customSli:
  indicator: |
    fetch spans
    | filter service.name == "checkout"
    | filter span.name == "oteldemo.CheckoutService/PlaceOrder"
    | summarize total = count(), good = countIf(span.status_code == "error")
    | fieldsAdd sli = ((toDouble(total) - toDouble(good)) / toDouble(total)) * 100
criteria:
  - name: "checkout-availability"
    target: 99.0
    warning: 99.5
    comparisonOperator: "GREATER_THAN_OR_EQUAL"
    timeframeFrom: "now()-7d"
    timeframeTo: "now()"
errorBudget:
  burnRateVisualizationEnabled: true
  alerting:
    - severity: page
      burnRate: 14.4
      window: "PT1H"
    - severity: ticket
      burnRate: 6
      window: "PT6H"
