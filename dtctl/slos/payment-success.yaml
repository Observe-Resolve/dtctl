# Payment success rate SLO — scoped to the demo cluster.
# In otel-demo, payment is part of the checkout flow. We measure successful
# PlaceOrder calls as a proxy for end-to-end payment success.
# Long-lived: no version suffix. Use the dashboard variable to filter by release.
type: slo
id: "vu9U3hXa3q0AAAABAClidWlsdGluOmludGVybmFsLnNlcnZpY2UubGV2ZWwub2JqZWN0aXZlcwAGdGVuYW50AAZ0ZW5hbnQAJGE2ZTA1MjkwLWQxOTItM2JmYi1iODliLWM3YzExZDE3MjY0ZL7vVN4V2t6t"
name: "payment-success"
enabled: true
customDescription: "Checkout PlaceOrder success rate over 7 days."
customSli:
  indicator: |
    fetch spans
    | filter service.name == "checkout"
    | filter span.name == "oteldemo.CheckoutService/PlaceOrder"
    | summarize total = count(), good = countIf(span.status_code == "error")
    | fieldsAdd sli = ((asLong(total) - asLong(good)) / asLong(total)) * 100
criteria:
  - name: "payment-success"
    target: 99.9
    warning: 99.95
    comparisonOperator: "GREATER_THAN_OR_EQUAL"
    timeframeFrom: "now()-7d"
    timeframeTo: "now()"
errorBudget:
  burnRateVisualizationEnabled: true
  alerting:
    - severity: page
      burnRate: 14.4
      window: "PT1H"
