# Guardian validation workflow — triggers SRG evaluation via SDLC event.
# Fires when Argo Rollouts starts a canary deployment.
# Sends an SDLC event that kicks off the Site Reliability Guardian validation.
#
# Long-lived: no version in the name. The guardian is version-agnostic.
id: "a352521f-bf0d-4768-91bf-3e917a0d68be"
title: "Checkout Release Guardian Validation"
description: |
  Triggered by Kubernetes deployment events for the checkout service.
  Sends an SDLC deployment event to the checkout-release-guardian,
  which starts the 10-minute evaluation window for the three objectives.
private: false
isdeployed: true
trigger:
  event:
    active: true
    config:
      eventType: K8S_DEPLOYMENT
      eventFilter:
        query: "dt.entity.cloud_application=='CLOUD_APPLICATION-CHECKOUT'"
tasks:
  send_sdlc_event:
    name: send-sdlc-event
    action: dynatrace.automations:http-function
    description: Send SDLC deployment event via Events API to trigger guardian evaluation
    input:
      url: "{{ .DT_ENVIRONMENT_URL }}/api/v2/events/ingest"
      method: POST
      headers:
        Content-Type: "application/json"
      payload: |
        {
          "eventType": "CUSTOM_DEPLOYMENT",
          "title": "Checkout canary deployment",
          "entitySelector": "type(SERVICE),entityName.equals(\"checkout\")",
          "properties": {
            "dt.event.deployment": "true",
            "dt.event.deployment.name": "checkout",
            "dt.event.deployment.release_stage": "production",
            "dt.event.deployment.release_product": "checkout",
            "guardian.name": "checkout-release-guardian",
            "deployment.type": "canary"
          }
        }
    position:
      x: 0
      "y": 1
    predecessors: []

  log_validation_start:
    name: log-validation-start
    action: dynatrace.automations:execute-dql-query
    description: Log guardian validation start to traces
    input:
      query: |
        fetch spans, from:now()-1m
        | filter service.name == "checkout"
        | limit 1
    position:
      x: 0
      "y": 2
    predecessors:
      - send_sdlc_event
    conditions:
      states:
        send_sdlc_event: OK
