# Alert workflow triggered when the checkout-availability SLO breaches.
# Fires in Ep. 09 Act 3 when chaos/break-checkout.sh injects faults.
title: "Checkout SLO Breach Alert"
description: |
  When checkout-availability SLO drops below target, enrich the alert with
  top error types + a pre-filled investigation notebook, then ping Slack.
private: false
isdeployed: true
trigger:
  event:
    active: true
    config:
      eventType: SLO_BREACH
      eventFilter:
        query: "sloName=='checkout-availability' AND severity=='PAGE'"
tasks:
  fetch_top_errors:
    name: fetch-top-errors
    action: dynatrace.automations:execute-dql-query
    description: Fetch top error types from checkout service
    input:
      query: |
        fetch spans, from:now()-15m
        | filter service.name == "checkout" and status == "ERROR"
        | filter k8s.cluster.name == "observeresolve-ep9-demo"
        | summarize count = count(),
                    by:{exception.type, span.name}
        | sort count desc
        | limit 5
    position:
      x: 0
      "y": 1
    predecessors: []

  baseline_compare:
    name: baseline-compare
    action: dynatrace.automations:execute-dql-query
    description: Fetch baseline metrics for comparison
    input:
      query: |
        fetch lookup("service_baselines")
        | filter service == "checkout"
    position:
      x: 0
      "y": 2
    predecessors:
      - fetch_top_errors
    conditions:
      states:
        fetch_top_errors: OK

  notify_slack:
    name: notify-slack
    action: dynatrace.slack:slack-send-message
    description: Send alert to Slack channel
    input:
      channel: "#oncall-ep9"
      message: |
        :rotating_light: *SLO breach — checkout-availability*

        **Current Status:**
        • SLI Value: {{ result("fetch_top_errors").sli }}%
        • Error Budget Burned: {{ result("fetch_top_errors").budgetBurned }}

        **Top Errors:**
        {% for error in result("fetch_top_errors").records %}
        • {{ error.exception_type }} — {{ error.count }} occurrences
          - Customer Tier: {{ error.customer_tier }}
          - Payment Method: {{ error.payment_method }}
        {% endfor %}

        Investigate immediately at: {{ env.DT_ENVIRONMENT_URL }}/ui/dashboards?id=checkout-errors
    position:
      x: 0
      "y": 3
    predecessors:
      - baseline_compare
    conditions:
      states:
        baseline_compare: OK

  tag_incident:
    name: tag-incident
    action: dynatrace.automations:tag-entity
    description: Tag checkout service with incident marker
    input:
      entityType: SERVICE
      entitySelector: 'type("SERVICE"),entityName.equals("checkout")'
      tags:
        - key: incident
          value: "ep9-demo"
        - key: triage
          value: "auto"
    position:
      x: 0
      "y": 4
    predecessors:
      - notify_slack
    conditions:
      states:
        notify_slack: SUCCESS
